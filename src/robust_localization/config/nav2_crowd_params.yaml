# config/nav2_crowd_params.yaml
# Nav2 人群模式配置（演示用）
amcl:
  ros__parameters:
    # 降低更新频率，更信里程计
    update_min_d: 0.5
    update_min_a: 0.2
    resample_interval: 2
    
    # 提高运动模型噪声
    alpha1: 0.3
    alpha2: 0.3
    alpha3: 0.3
    alpha4: 0.3
    
    # 激光参数
    laser_min_range: 0.5
    laser_max_range: 10.0
    laser_max_beams: 180
    
    # 恢复行为
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

controller_server:
  ros__parameters:
    # 人群模式：低速 + 低敏感度
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.15        # 演示限速 0.15 m/s
      max_linear_accel: 0.3
      max_linear_decel: 0.3
      
      # 降低障碍物敏感度
      inflation_cost_scaling_factor: 0.3
      cost_scaling_dist: 0.5
      
      # 轨迹评估
      use_collision_detection: true
      simulate_ahead_time: 1.0
      
local_costmap:
  local_costmap:
    ros__parameters:
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        observation_sources: laser1 laser2
        laser1:
          topic: /scan_front
          clearing: true
          marking: true
          obstacle_range: 2.0        # 只看2米内
          raytrace_range: 3.0
          decay_time: 0.3            # 快速清除人影
        laser2:
          topic: /scan_rear
          clearing: true
          marking: true
          obstacle_range: 2.0
          raytrace_range: 3.0
          decay_time: 0.3