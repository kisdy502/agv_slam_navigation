## 最大速度一直是0.5米、秒，原来是没加velocity_smoother配置，导致用的默认配置，最大速度就是0.5
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.5, 0.0, 1.2]      # [vx_max, vy_max, wz_max]
    min_velocity: [-0.35, 0.0, -1.2]   # [vx_min, vy_min, wz_min]
    max_accel: [2.5, 0.0, 3.2]         # [ax_max, ay_max, aw_max]
    min_accel: [-2.5, 0.0, -3.2]       # [ax_min, ay_min, aw_min]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0