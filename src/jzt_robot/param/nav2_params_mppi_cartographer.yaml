# ============================================================
# Nav2 参数配置文件 - Cartographer定位版本
# 基于原始AMCL配置优化，保持定位精度
# ============================================================

amcl_map_server:
  ros__parameters:
    use_sim_time: True

# ============================================================
# 🟢 Cartographer 定位节点 (替代AMCL)
# ============================================================
cartographer_node:
  ros__parameters:
    use_sim_time: True
    config_files:
      - $(find-pkg-share jzt_robot)/config/localization_2d.lua
    lookup_transform_timeout_sec: 0.2
    submap_publish_period_sec: 0.3
    pose_publish_period_sec: 0.02
    trajectory_publish_period_sec: 0.03

# Cartographer 占据栅格地图发布器
cartographer_occupancy_grid_node:
  ros__parameters:
    use_sim_time: True
    resolution: 0.05 # 5cm分辨率，与原AMCL配置兼容
    publish_period_sec: 1.0

# ============================================================
# 🔵 定位恢复和行为服务器
# ============================================================
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 1.5 # 对应原AMCL的transform_tolerance
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# 初始位姿发布器 (Cartographer定位模式使用)
initial_pose:
  ros__parameters:
    use_sim_time: True

# ============================================================
# 🟡 路径规划服务器
# ============================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

# 平滑器服务器
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# ============================================================
# 🔴 控制器服务器 - MPPI (保持原有配置)
# ============================================================
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.005
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    current_goal_checker: "general_goal_checker"
    controller_plugins: ["FollowPath"]
    speed_limit_topic: "speed_limit"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 25.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.30

    # MPPI 局部规划器配置
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      motion_model: "DiffDrive"
      time_steps: 24
      model_dt: 0.1
      batch_size: 1000
      iteration_count: 3
      vx_max: 1.5
      vx_min: -0.5
      vy_max: 0.0
      wz_max: 2.5
      ax_max: 2.0 # 适当提高，测试极限
      ax_min: -2.0
      prune_distance: 2.0
      temperature: 1.0
      gamma: 0.15
      transform_tolerance: 0.5 # 降低，暴露TF问题
      visualize: false # 临时开启，RViz看采样轨迹

      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]

      ConstraintCritic.scale: 1.0
      CostCritic.scale: 1.5
      CostCritic.critical_cost: 4000.0
      CostCritic.consider_footprint: true
      CostCritic.collision_cost: 10000.0
      CostCritic.near_goal_distance: 1.0

      GoalCritic.scale: 4.0
      GoalCritic.threshold_to_consider: 3.0
      GoalAngleCritic.scale: 3.0
      GoalAngleCritic.threshold_to_consider: 0.5

      PathAlignCritic.scale: 5.0
      PathAlignCritic.threshold_to_consider: 0.5
      PathAlignCritic.offset_from_furthest: 20
      PathAlignCritic.trajectory_point_step: 2

      PathFollowCritic.scale: 3.0
      PathFollowCritic.offset_from_furthest: 20

      PathAngleCritic.scale: 2.0
      PathAngleCritic.threshold_to_consider: 0.5
      PathAngleCritic.offset_from_furthest: 4

      PreferForwardCritic.scale: 10.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

# ============================================================
# 🟢 本地代价地图 (保持原有配置)
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[-0.3, -0.2], [-0.3, 0.2], [0.3, 0.2], [0.3, -0.2]]"
      inflation_radius: 0.45
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.35
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

# ============================================================
# 🔵 全局代价地图 (保持原有配置)
# ============================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[[-0.3, -0.2], [-0.3, 0.2], [0.3, 0.2], [0.3, -0.2]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

# ============================================================
# 🟡 速度平滑器 (保持原有配置)
# ============================================================
velocity_smoother:
  ros__parameters:
    max_velocity: [1.5, 0.0, 1.5]
    min_velocity: [-1.0, 0.0, -1.0]
    max_accel: [3.0, 0.0, 3.0]
    max_decel: [-3.0, 0.0, -3.0]
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    velocity_timeout: 1.0
    use_sim_time: True

# ============================================================
# 🟠 路点跟踪器 (保持原有配置)
# ============================================================
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# ============================================================
# 🔧 其他节点 (保持原有配置)
# ============================================================
robot_state_publisher:
  ros__parameters:
    use_sim_time: True

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: odom
    bt_loop_duration: 10
