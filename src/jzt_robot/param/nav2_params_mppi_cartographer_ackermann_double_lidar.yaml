controller_server:
  ros__parameters:
    controller_frequency: 12.0 # 20→15, RPP+碰撞检测+代价缩放 CPU 吃紧
    use_sim_time: True

    controller_plugins: ["FollowPath"]

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]

    speed_limit_topic: "speed_limit"
    # default_goal_checker: "general_goal_checker"

    # -------------------------
    # 进度检查器
    # -------------------------
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # -------------------------
    # 目标检查器（⚠️ 非常关键）
    # -------------------------
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: false
      xy_goal_tolerance: 0.08 # 11cm, 阿克曼粗定位
      yaw_goal_tolerance: 0.30 # 20°, 避免兜圈

    # -------------------------
    # Regulated Pure Pursuit
    # -------------------------
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ===== 基本速度 =====
      desired_linear_vel: 0.80
      # ===== Lookahead（阿克曼核心）=====
      lookahead_dist: 1.2
      min_lookahead_dist: 0.6
      max_lookahead_dist: 2.5
      use_regulated_linear_velocity_scaling: true

      use_velocity_scaled_lookahead: true
      lookahead_time: 1.2

      # ===== 转向控制 =====
      use_rotate_to_heading: false
      rotate_to_heading_angular_vel: 0.6

      min_approach_linear_velocity: 0.10
      approach_velocity_scaling_dist: 2.0

      regulated_linear_scaling_min_radius: 1.41 # ← 用最小转弯半径代替steering angle
      regulated_linear_scaling_min_speed: 0.15

      # ===== 代价图避障（根据 costmap 代价自动减速，核心避障机制）=====
      use_cost_regulated_linear_velocity_scaling: true
      inflation_cost_scaling_factor: 3.0
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0

      # ===== 碰撞保护 =====
      use_collision_detection: true
      max_allowed_time_to_collision: 0.5 # 只前瞻0.5s, 避免空旷区域误报
      # ===== 调试 =====
      visualize: false

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

## 本地代价地图 (保持原有配置)
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 5.0
      global_frame: odom
      transform_tolerance: 0.25       
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: True
      width: 8
      height: 8
      resolution: 0.05
      footprint: "[[-0.60, -0.33], [0.60, -0.33], [0.60, 0.33], [-0.60, 0.33]]"
      inflation_radius: 0.35
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0 # 代价平缓衰减, 远离障碍
        inflation_radius: 0.8 # 0.6→0.8, 增大排斥区, 避免贴墙走
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        transform_tolerance: 0.25 # 允许激光帧与tf偏差0.25s, 消除Message Filter丢帧导致的像素噪点
        observation_sources: scan_front scan_rear
        scan_front:
          topic: /scan_front
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
        scan_rear:
          topic: /scan_rear
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

## 全局代价地图 (保持原有配置)
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[[-0.60, -0.33], [0.60, -0.33], [0.60, 0.33], [-0.60, 0.33]]"
      resolution: 0.05
      track_unknown_space: True
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        transform_tolerance: 0.85
        observation_sources: scan_front scan_rear
        scan_front:
          topic: /scan_front
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.0
          obstacle_min_range: 0.0
        scan_rear:
          topic: /scan_rear
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0 # 10→3, 与局部匹配, 代价平缓
        inflation_radius: 1.2 # 0.8→1.2, 全局路径远离障碍, 避免规划器偏好密集区
      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True
## 路点跟踪器 (保持原有配置)
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

