### Nav2 参数配置文件 - Cartographer定位版本 MPPI局部规划器，适合阿克曼底盘

## 定位恢复和行为服务器
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "drive_on_heading", "wait"]
    # spin:
    #   plugin: "nav2_behaviors/Spin"   # 纯原地旋转，阿克曼无法执行
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      acceleration_limit: 1.0 # 1.0 m/s², 在正常 max_accel 一半左右
      deceleration_limit: -1.5 # -1.5 m/s², 刹车稍猛于加速（安全优先）
      minimum_speed: 0.15 # 与 RPP 的 min_approach_linear_velocity 一致

    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.20 # 对应原AMCL的transform_tolerance
    # use_sim_time: True
    simulate_ahead_time: 2.0
    # max_rotational_vel: 0.8 # 阿克曼不能原地转，降低角速度
    # min_rotational_vel: 0.2
    # rotational_acc_lim: 2.0

## 路径规划服务器
planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    # GridBased:
    #   plugin: "nav2_navfn_planner/NavfnPlanner"
    #   tolerance: 0.5
    #   use_astar: True #全局路径规划，使用a*算法
    #   allow_unknown: false #allow_unknown 改为 false，这样规划器只会使用已知地图，路径更稳定，不会无谓重规划
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"

      # 基础
      tolerance: 0.5
      allow_unknown: false

      # SE2 离散化
      angle_quantization_bins: 72

      # 🔥 阿克曼运动学（二选一）
      motion_model_for_search: "DUBIN" # 只能前进
      # motion_model_for_search: "REEDS_SHEPP"  # 可倒挡

      minimum_turning_radius: 1.41 # ⚠️ 实测你的车最小转弯半径

      # 性能
      downsample_costmap: true
      downsampling_factor: 2
      max_planning_time: 5.0 # 2.0→5.0, 长距离(>40m) DUBIN需要更多时间搜索
      max_iterations: 1000000 # 500k→1M, 配合延长时间
      max_on_approach_iterations: 1000

      # 路径质量
      smooth_path: true

      # 启发式与扩展
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 6.0 # 3.0→6.0, DUBIN末端连接需要更多空间

      # 惩罚项
      non_straight_penalty: 1.2
      change_penalty: 0.0
      reverse_penalty: 2.0 # Dubin 模式下无效，但留着无害
      cost_penalty: 5.0
      retrospective_penalty: 0.015

      # 其他
      cache_obstacle_heuristic: false
      lookup_table_size: 20.0

      smoother: # ← 添加这个嵌套层级
        tolerance: 1.0e-10
        max_iterations: 800
        w_data: 0.2
        w_smooth: 0.3
        do_refinement: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

## 平滑器服务器
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 800
      do_refinement: True
      #控制平滑强度
      w_data: 0.2 # 数据保真权重（越小越平滑，越不贴原路径）
      w_smooth: 0.3 # 平滑权重（越大曲线越顺滑）

