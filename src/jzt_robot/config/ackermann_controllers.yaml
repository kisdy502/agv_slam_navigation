controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    # 关节状态广播器
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 阿克曼转向控制器
    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    # 速度转发器（用于调试）
    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

# ==================== 阿克曼转向控制器配置 ====================
ackermann_steering_controller:
  ros__parameters:
    # 参考帧
    reference_timeout: 0.1
    front_steering: true # 前轮转向
    open_loop: false # 闭环控制（使用编码器反馈）
    velocity_rolling_window_size: 10
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: false # Cartographer 负责 map→odom，这里只发 odom→base_footprint
    # publish_odom: true          # 必须为 true

    # 底盘几何参数
    wheelbase: 0.80 # 轴距
    front_wheel_track: 0.56 # 前轮轮距
    rear_wheel_track: 0.56 # 后轮轮距
    front_wheels_radius: 0.12 # 前轮半径
    rear_wheels_radius: 0.12 # 后轮半径

    # 关节映射
    rear_wheels_names: [right_rear_wheel_joint, left_rear_wheel_joint]
    front_wheels_names: [front_right_steer_joint, front_left_steer_joint]
    # front_wheels_names: [right_front_wheel_joint,left_front_wheel_joint]

    # 里程计发布
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
