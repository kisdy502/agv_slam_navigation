# Gamepad Teleop Configuration for JZT Robot
# 北通/Xbox兼容手柄配置文件

gamepad_teleop_node:
  ros__parameters:
    # ===== 手柄轴号映射 =====
    # 北通/微软布局:
    # axis 0: 左摇杆左右
    # axis 1: 左摇杆上下
    # axis 2: 右摇杆左右
    # axis 3: 右摇杆上下
    # axis 4: 十字键左右
    # axis 5: 十字键上下
    
    # 当前配置: 左摇杆控制
    axis_linear: 1          # 左摇杆上下 -> 前进/后退
    axis_angular: 0         # 左摇杆左右 -> 左转/右转
    
    # ===== 速度参数 =====
    # 基于仿真器 max_wheel_acceleration: 2.5
    scale_linear: 0.5       # 最大线速度 m/s (前进/后退速度)
    scale_angular: 1.0      # 最大角速度 rad/s (转向速度)
    
    # ===== 安全设置 =====
    enable_deadzone: true   # 启用死区，防止摇杆漂移
    deadzone: 0.1           # 死区阈值 [0.0 ~ 1.0]
    
    # ===== 按钮功能 =====
    # 按键编号 (北通/微软布局):
    # 0: A/Cross, 1: B/Circle, 2: X/Square, 3: Y/Triangle
    # 4: LB/L1, 5: RB/R1, 6: LT/L2, 7: RT/R2
    # 8: Back/Select, 9: Start, 10: 左摇杆按下, 11: 右摇杆按下
    
    btn_stop: 0             # A键: 紧急停止 (发布零速度)
